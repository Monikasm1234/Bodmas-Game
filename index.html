<!doctype html>
<html>
  <head>
    <title>BODMAS Master Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>🎯 BODMAS Master Pro</h1>

    <div class="container">
      <p class="instruction">
        👉 Click the correct operation based on BODMAS rule
      </p>

      <h2 id="question"></h2>

      <div id="options"></div>

      <p id="feedback"></p>
      <p id="explanation"></p>

      <div class="stats">
        <span>⭐ Score: <span id="score">0</span></span>
        <span>🏆 Level: <span id="level">1</span></span>
        <span>⏱️ Time: <span id="timer">10</span>s</span>
      </div>

      <button id="nextBtn">Next</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
